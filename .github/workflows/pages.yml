name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: todo-app/package-lock.json

      - name: Build todo-app
        working-directory: todo-app
        env:
          GITHUB_PAGES: 'true'
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/todo-app _site/mini-api
          cp landing-page/index.html landing-page/styles.css landing-page/script.js _site/
          cp -r todo-app/dist/* _site/todo-app/
          cp mini-api/docs.html mini-api/openapi.yaml _site/mini-api/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
